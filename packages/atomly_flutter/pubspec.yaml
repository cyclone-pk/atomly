name: atomly_flutter
description: >-
  Flutter integration for atomly. Provides AtomScope, AtomBuilder, AtomConsumer,
  AtomListener, and BuildContext extensions for reactive atomic state.
version: 0.1.1
repository: https://github.com/cyclone-pk/atomly/tree/main/packages/atomly_flutter
issue_tracker: https://github.com/cyclone-pk/atomly/issues
homepage: https://github.com/cyclone-pk/atomly
topics:
  - state
  - state-management
  - flutter
  - reactive
  - atom

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  atomly: ^0.1.1
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0

