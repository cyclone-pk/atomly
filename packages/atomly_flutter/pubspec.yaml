name: atomly_flutter
description: >-
  Flutter integration for the atomly atomic state manager. Provides
  AtomScope, AtomBuilder, AtomConsumer, AtomListener, and BuildContext
  extensions for watch / read / select / when / listen / set / update /
  refresh.
version: 0.1.0
repository: https://github.com/cyclone-pk/atomly/tree/main/packages/atomly_flutter
issue_tracker: https://github.com/cyclone-pk/atomly/issues
homepage: https://github.com/cyclone-pk/atomly
topics:
  - state
  - state-management
  - flutter
  - reactive
  - atom

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  atomly: ^0.1.0
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^4.0.0

flutter:
